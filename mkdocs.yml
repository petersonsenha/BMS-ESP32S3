          - ESP32-S3: conhecimento/conceitos/esp32-s3.md
          - AFE: conhecimento/conceitos/afe.md
          - Balanceamento passivo: conhecimento/conceitos/balanceamento-passivo.md
      - Hardware:
          - Esquematico logico: conhecimento/hardware/esquematico-logico-bms-4s.md
          - Shunt: conhecimento/hardware/shunt.md
          - NTC: conhecimento/hardware/ntc.md
          - Fusivel: conhecimento/hardware/fusivel.md
          - MOSFET de carga: conhecimento/hardware/mosfet-de-carga.md
          - MOSFET de descarga: conhecimento/hardware/mosfet-de-descarga.md
      - Protecoes:
          - Sobretensao: conhecimento/protecoes/sobretensao.md
          - Subtensao: conhecimento/protecoes/subtensao.md
          - Sobrecorrente: conhecimento/protecoes/sobrecorrente.md
          - Curto-circuito: conhecimento/protecoes/curto-circuito.md
          - Sobretemperatura: conhecimento/protecoes/sobretemperatura.md
          - Fail-safe: conhecimento/protecoes/fail-safe.md
      - Firmware:
