site_name: BMS-ESP32S3
site_description: Documentacao online da BMS 4S com ESP32-S3
site_url: https://petersonsenha.github.io/BMS-ESP32S3/
repo_url: https://github.com/petersonsenha/BMS-ESP32S3
repo_name: petersonsenha/BMS-ESP32S3
docs_dir: site_docs
site_dir: site
strict: true

theme:
  name: material
  language: pt-BR
  logo: material/battery-high
  favicon: material/battery-heart-variant
  icon:
    repo: fontawesome/brands/github
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Alternar para tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Alternar para tema claro

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://d3js.org/d3.v7.min.js
  - assets/javascripts/d3-graphs.js

nav:
  - Inicio: index.md
  - Projeto:
      - Visao geral: projeto/visao-geral.md
      - Arquitetura 4S: projeto/arquitetura-bms-4s.md
      - Funcionamento da BMS: projeto/funcionamento-da-bms.md
      - Tecnicas de protecao: projeto/protecao-bms.md
      - Maquina de estados: projeto/maquina-de-estados-bms.md
      - Diagnostico e eventos: projeto/diagnostico-e-eventos.md
      - AFE em BMS: projeto/afe-em-bms.md
      - DoR e DoD: projeto/dor-e-dod.md
      - Configuracao JSON: projeto/configuracao-json.md
      - Publicacao no GitHub Pages: projeto/publicacao-github-pages.md
  - Base de conhecimento:
      - Visao geral: conhecimento/visao-geral.md
      - Obsidian no projeto: conhecimento/obsidian-vault-bms.md
      - Mapas relacionais: conhecimento/mapas-relacionais.md
      - MOCs:
          - Start Here: conhecimento/mocs/start-here.md
          - MOC BMS: conhecimento/mocs/moc-bms.md
          - MOC Hardware: conhecimento/mocs/moc-hardware.md
          - MOC Protecoes: conhecimento/mocs/moc-protecoes.md
          - MOC Firmware: conhecimento/mocs/moc-firmware.md
          - MOC Testes: conhecimento/mocs/moc-testes.md
          - Indice por componente: conhecimento/mocs/indice-por-componente.md
          - Indice por requisito: conhecimento/mocs/indice-por-requisito.md
          - Indice por configuracao: conhecimento/mocs/indice-por-configuracao.md
      - Conceitos:
